<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 512 140"
     preserveAspectRatio="xMidYMid meet"
     role="img"
     aria-labelledby="rusty-rich-title">
  <title id="rusty-rich-title">rusty-rich — Rich text &amp; beautiful formatting for the terminal</title>

  <!--
    rusty-rich v0.2.1 — Brand Logo
    ===============================
    Mark:    Crab-gear hybrid. A 12-tooth cog forms the crab body
             with pincer claws, stalked eyes, and six walking legs.
             The gear represents Rust engineering; the crab is the
             Rust mascot; the robust mechanical form carries "rich."

    Palette: #F74C00 — brand rust orange (sole color)

    Type:    Geometric monoline stroke letterforms.
             Baseline y=104, x-height=38 (top at y=66),
             ascender top y=56, descender bottom y=118,
             stroke width 5.5px.

    Validation:
      [x] Zero <text> elements
      [x] Zero font-family
      [x] Zero filters
      [x] Zero radial gradients
      [x] Zero background rects
      [x] Path-based wordmark
      [x] Content-fit viewBox (512×140, horizontal mark)
      [x] <title> present
      [x] No editor namespaces
  -->

  <!-- ═══════════════════════════════════════════════════════ -->
  <!--  MARK — Crab-Gear Hybrid                                -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!--
    Gear Body — 12-tooth polygon + central circular cutout.
    fill-rule="evenodd" makes the center hole transparent.
    Outer polygon computed trigonometrically:
      R_outer=52, R_inner=38, N=12 teeth, center=(64, 70).
    Center hole drawn via two 180° arcs for reliable rendering.
  -->
  <path id="gear-body" fill="#F74C00" fill-rule="evenodd" d="
    M 64.0,18.0 L 73.835,33.295 L 90.0,24.967 L 90.87,43.13
    L 109.033,44.0 L 100.705,60.165 L 116.0,70.0 L 100.705,79.835
    L 109.033,96.0 L 90.87,96.87 L 90.0,115.033 L 73.835,106.705
    L 64.0,122.0 L 54.165,106.705 L 38.0,115.033 L 37.13,96.87
    L 18.967,96.0 L 27.295,79.835 L 12.0,70.0 L 27.295,60.165
    L 18.967,44.0 L 37.13,43.13 L 38.0,24.967 L 54.165,33.295 Z
    M 64,36 A 34,34 0 1,0 64,104 A 34,34 0 1,0 64,36 Z
  "/>

  <!-- Center hub — mechanical axle detail -->
  <circle id="gear-hub" cx="64" cy="70" r="7" fill="#F74C00"/>

  <!--
    Left Claw — crab pincer.
    Upper tine curves out-left-down, lower tine curves out-left-up.
    They nearly meet at the tip, forming the characteristic claw gap.
  -->
  <path id="claw-left" fill="#F74C00" d="
    M 22,56
    C 8,42 -4,40 -14,44
    C -22,47 -24,54 -18,58
    C -12,63 0,65 10,66
    L 12,68
    C 2,70 -10,72 -16,78
    C -22,84 -20,90 -12,92
    C -2,95 12,88 22,78
    Z
  "/>

  <!-- Right Claw — mirror of left claw -->
  <path id="claw-right" fill="#F74C00" d="
    M 106,56
    C 120,42 132,40 142,44
    C 150,47 152,54 146,58
    C 140,63 128,65 118,66
    L 116,68
    C 126,70 138,72 144,78
    C 150,84 148,90 140,92
    C 130,95 116,88 106,78
    Z
  "/>

  <!--
    Eyes & Legs — combined stroke group.
    Eye stalks: short lines angling up and out.
    Legs: 3 per side, each 2 segments tapering outward.
  -->
  <g id="eyes-and-legs" fill="none" stroke="#F74C00" stroke-linecap="round" stroke-linejoin="round">
    <!-- Eye stalks -->
    <path stroke-width="4.5" d="M 50,40 L 44,20"/>
    <path stroke-width="4.5" d="M 78,40 L 84,20"/>

    <!-- Left legs — tapering from body to ground -->
    <path stroke-width="5.0" d="M 34,114 L 18,130"/>
    <path stroke-width="4.0" d="M 18,130 L 6,138"/>
    <path stroke-width="5.0" d="M 28,118 L 14,134"/>
    <path stroke-width="4.0" d="M 14,134 L 2,142"/>
    <path stroke-width="4.5" d="M 32,124 L 22,136"/>
    <path stroke-width="3.5" d="M 22,136 L 12,142"/>

    <!-- Right legs — mirror of left -->
    <path stroke-width="5.0" d="M 94,114 L 110,130"/>
    <path stroke-width="4.0" d="M 110,130 L 122,138"/>
    <path stroke-width="5.0" d="M 100,118 L 114,134"/>
    <path stroke-width="4.0" d="M 114,134 L 126,142"/>
    <path stroke-width="4.5" d="M 96,124 L 106,136"/>
    <path stroke-width="3.5" d="M 106,136 L 116,142"/>
  </g>

  <!-- Eyes — solid filled circles (works on any background) -->
  <circle id="eye-left" cx="42" cy="16" r="7" fill="#F74C00"/>
  <circle id="eye-right" cx="86" cy="16" r="7" fill="#F74C00"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!--  WORDMARK — "rusty-rich"                                 -->
  <!--  Geometric monoline stroke letterforms.                  -->
  <!--  Baseline y=104, x-height=38 (y:66→104).                 -->
  <!--  Ascender top y=56, descender bottom y=118.              -->
  <!--  Stroke 5.5px, round caps, round joins.                  -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <g id="wordmark" fill="none" stroke="#F74C00" stroke-width="5.5"
     stroke-linecap="round" stroke-linejoin="round">

    <!-- r — stem ascender→baseline + shoulder arc branching right -->
    <path d="M 160,104 L 160,72 C 160,58 168,56 172,64"/>

    <!-- u — two stems joined by a bottom curve (U-shape) -->
    <path d="M 184,66 L 184,90 C 184,106 206,106 206,90 L 206,66"/>

    <!-- s — two-segment S-curve: upper arc bows left, lower arc bows right -->
    <path d="M 224,68 C 210,64 208,76 214,82 C 222,90 218,104 208,102"/>

    <!-- t — ascender stem + crossbar at x-height -->
    <path d="M 232,56 L 232,104"/>
    <path d="M 224,74 L 244,74"/>

    <!-- y — V-shape (two diagonals meeting at x-height) + descender -->
    <path d="M 252,66 L 262,86"/>
    <path d="M 262,86 L 272,66"/>
    <path d="M 262,86 L 262,118"/>

    <!-- hyphen — centered dash at visual midline -->
    <path d="M 286,86 L 302,86"/>

    <!-- r — stem + shoulder arc -->
    <path d="M 316,104 L 316,72 C 316,58 324,56 328,64"/>

    <!-- i — stem + tittle (dot) -->
    <path d="M 344,66 L 344,104"/>
    <path d="M 344,50 L 344,54"/>

    <!-- c — open curve facing right, tighter at terminals -->
    <path d="M 368,68 C 352,64 350,80 356,90 C 362,100 372,104 376,104"/>

    <!-- h — left ascender stem + shoulder curve to right stem -->
    <path d="M 384,56 L 384,104"/>
    <path d="M 384,82 C 384,66 404,66 406,80 L 406,104"/>

  </g>

</svg>