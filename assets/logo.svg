<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <!-- Gradient backgrounds -->
    <linearGradient id="rustGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F74C00"/>
      <stop offset="50%" style="stop-color:#E04400"/>
      <stop offset="100%" style="stop-color:#C83200"/>
    </linearGradient>
    <linearGradient id="termGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1E2E"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F74C00"/>
      <stop offset="16%" style="stop-color:#F7A800"/>
      <stop offset="33%" style="stop-color:#F7E800"/>
      <stop offset="50%" style="stop-color:#4CAF50"/>
      <stop offset="66%" style="stop-color:#2196F3"/>
      <stop offset="83%" style="stop-color:#7C4DFF"/>
      <stop offset="100%" style="stop-color:#E91E63"/>
    </linearGradient>
    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000055"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Terminal window background -->
  <rect x="100" y="25" width="460" height="155" rx="10" ry="10" fill="url(#termGrad)" filter="url(#shadow)"/>

  <!-- Terminal title bar -->
  <rect x="100" y="25" width="460" height="28" rx="10" ry="10" fill="#313244"/>
  <rect x="100" y="40" width="460" height="13" fill="#313244"/>
  <!-- Traffic light dots -->
  <circle cx="118" cy="39" r="5" fill="#FF5F56"/>
  <circle cx="136" cy="39" r="5" fill="#FFBD2E"/>
  <circle cx="154" cy="39" r="5" fill="#27C93F"/>
  <!-- Title text -->
  <text x="330" y="43" font-family="monospace" font-size="11" fill="#A6ADC8" text-anchor="middle">rusty-rich ~ zsh</text>

  <!-- Cursor prompt -->
  <text x="125" y="68" font-family="monospace" font-size="12" fill="#A6ADC8">❯</text>
  <text x="142" y="68" font-family="monospace" font-size="12" fill="#A6ADC8"> </text>
  <text x="147" y="68" font-family="monospace" font-size="12" fill="#89B4FA">console</text>
  <text x="198" y="68" font-family="monospace" font-size="12" fill="#A6ADC8">.</text>
  <text x="204" y="68" font-family="monospace" font-size="12" fill="#A6ADC8">print</text>
  <text x="234" y="68" font-family="monospace" font-size="12" fill="#F9E2AF">(</text>
  <text x="240" y="68" font-family="monospace" font-size="12" fill="#A6E3A1">"[bold red]</text>
  <text x="318" y="68" font-family="monospace" font-size="12" fill="#CBA6F7">Hello</text>
  <text x="354" y="68" font-family="monospace" font-size="12" fill="#A6E3A1"> [/bold red]"</text>
  <text x="444" y="68" font-family="monospace" font-size="12" fill="#F9E2AF">)</text>

  <!-- Cursor block -->
  <rect x="456" y="54" width="8" height="16" rx="1" fill="#F5C2E7" opacity="0.85"/>

  <!-- Output line - styled text -->
  <text x="125" y="90" font-family="monospace" font-size="13" font-weight="bold" fill="#F74C00">H</text>
  <text x="135" y="90" font-family="monospace" font-size="13" font-weight="bold" fill="#F7A800">e</text>
  <text x="145" y="90" font-family="monospace" font-size="13" font-weight="bold" fill="#F7E800">l</text>
  <text x="155" y="90" font-family="monospace" font-size="13" font-weight="bold" fill="#4CAF50">l</text>
  <text x="165" y="90" font-family="monospace" font-size="13" font-weight="bold" fill="#2196F3">o</text>

  <!-- Second prompt/line showing more features -->
  <text x="125" y="110" font-family="monospace" font-size="12" fill="#A6ADC8">❯</text>
  <text x="142" y="110" font-family="monospace" font-size="12" fill="#A6E3A1">[cyan]</text>
  <text x="180" y="110" font-family="monospace" font-size="12" fill="#89DCEB">━━━ Table ━━━</text>
  <text x="270" y="110" font-family="monospace" font-size="12" fill="#A6E3A1">[/cyan]</text>

  <!-- Mini table -->
  <text x="125" y="130" font-family="monospace" font-size="11" fill="#CBA6F7">┌──────┬─────┐</text>
  <text x="125" y="143" font-family="monospace" font-size="11" fill="#CBA6F7">│</text>
  <text x="133" y="143" font-family="monospace" font-size="11" fill="#F9E2AF"> Name </text>
  <text x="179" y="143" font-family="monospace" font-size="11" fill="#CBA6F7">│</text>
  <text x="185" y="143" font-family="monospace" font-size="11" fill="#F9E2AF"> Age </text>
  <text x="217" y="143" font-family="monospace" font-size="11" fill="#CBA6F7">│</text>
  <text x="125" y="156" font-family="monospace" font-size="11" fill="#CBA6F7">├──────┼─────┤</text>
  <text x="125" y="169" font-family="monospace" font-size="11" fill="#CBA6F7">│</text>
  <text x="133" y="169" font-family="monospace" font-size="11" fill="#A6E3A1">Alice</text>
  <text x="179" y="169" font-family="monospace" font-size="11" fill="#CBA6F7">│</text>
  <text x="185" y="169" font-family="monospace" font-size="11" fill="#89B4FA"> 30 </text>
  <text x="217" y="169" font-family="monospace" font-size="11" fill="#CBA6F7">│</text>
  <text x="125" y="182" font-family="monospace" font-size="11" fill="#CBA6F7">└──────┴─────┘</text>

  <!-- Rust gear/cog icon on the left -->
  <g transform="translate(45, 100)" filter="url(#shadow)">
    <!-- Outer gear body -->
    <path d="M0,-28 C15.5,-28 28,-15.5 28,0 C28,15.5 15.5,28 0,28 C-15.5,28 -28,15.5 -28,0 C-28,-15.5 -15.5,-28 0,-28 Z" fill="url(#rustGrad)"/>
    <!-- Center R letter -->
    <text x="0" y="7" font-family="sans-serif" font-size="30" font-weight="900" fill="#FFFFFF" text-anchor="middle">R</text>
  </g>

  <!-- "rusty-rich" text beside the gear -->
  <text x="340" y="147" font-family="sans-serif" font-size="28" font-weight="800" fill="#F74C00" filter="url(#glow)">rusty</text>
  <text x="430" y="147" font-family="sans-serif" font-size="28" font-weight="300" fill="#CDD6F4">-rich</text>

  <!-- subtitle -->
  <text x="380" y="168" font-family="sans-serif" font-size="10" fill="#6C7086" text-anchor="middle">Rich text &amp; beautiful formatting for the terminal</text>
</svg>
